kind = "web"
previewPath = "/"
title = "Nodern — Web Development Agency"
version = "1.0.0"
id = "artifacts/nodern"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19411

[services.development]
run = "pnpm --filter @workspace/nodern run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nodern", "run", "build" ]
run = "pnpm --filter @workspace/nodern run start"

[services.env]
PORT = "19411"
